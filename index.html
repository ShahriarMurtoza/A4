<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Application Tracker</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-8">

  <!-- HEADER -->
  <h1 class="text-2xl font-bold mb-6">Job Application Tracker</h1>

  <!-- COUNTERS -->
  <div class="grid grid-cols-3 gap-4 mb-8">
    <div class="bg-white p-4 rounded shadow">
      <p>Total</p>
      <h2 id="totalCount" class="text-xl font-bold">0</h2>
    </div>

    <div class="bg-white p-4 rounded shadow">
      <p>Interview</p>
      <h2 id="interviewCount" class="text-xl font-bold text-green-600">0</h2>
    </div>

    <div class="bg-white p-4 rounded shadow">
      <p>Rejected</p>
      <h2 id="rejectedCount" class="text-xl font-bold text-red-600">0</h2>
    </div>
  </div>
  
    <!-- FILTER BUTTONS -->
    <div class="mb-6 flex gap-3">
      <button onclick="filterJobs('all')" class="px-4 py-1 bg-blue-500 text-white rounded">All</button>
      <button onclick="filterJobs('interview')" class="px-4 py-1 bg-green-500 text-white rounded">Interview</button>
      <button onclick="filterJobs('rejected')" class="px-4 py-1 bg-red-500 text-white rounded">Rejected</button>
    </div>
  
    <!-- JOB LIST -->
    <div id="job-list"></div>
  
    <!-- EMPTY STATE -->
    <div id="empty-state" class="hidden bg-white rounded-lg shadow p-16 text-center">
      <div class="flex flex-col items-center">
        <div class="text-6xl mb-4"><img src="./jobs.png" alt=""></div>
  
        <h2 class="text-xl font-semibold text-gray-700">
          No jobs available
        </h2>
  
        <p class="text-gray-500 text-sm mt-2">
          Check back soon for new job opportunities
        </p>
      </div>
    </div>
    <script src="./index.js"></script>
</body>
</html>
